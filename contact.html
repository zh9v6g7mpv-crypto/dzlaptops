<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Contact DZLaptops in Oran, Algeria — call 0552425776 or 0558553652, WhatsApp, or @dzlaptops on Instagram and Facebook." />
<meta name="theme-color" content="#2f6bff" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232f6bff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='4' width='18' height='12' rx='2'/%3E%3Cpath d='M2 20h20'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="assets/css/style.css" />
<title>Contact — DZLaptops</title>
<script>
  (function () {
    try {
      var t = localStorage.getItem('dz-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      var l = localStorage.getItem('dz-lang') || 'en';
      var r = document.documentElement;
      r.classList.add('js');
      r.setAttribute('data-theme', t);
      r.setAttribute('lang', l);
      r.setAttribute('dir', l === 'ar' ? 'rtl' : 'ltr');
    } catch (e) {}
  })();
</script>

<body data-page="contact" data-page-meta="meta.contact">
  <div id="site-header"></div>

  <main>
    <header class="page-header">
      <div class="container">
        <span class="tag" data-i18n="label.contact">Contact</span>
        <h1 data-i18n="contact.title">Get in touch</h1>
        <p data-i18n="contact.sub">Call, message, or visit us. We reply fast on WhatsApp.</p>
      </div>
    </header>

    <section>
      <div class="container">
        <div class="channels reveal" id="contactGrid"></div>
      </div>
    </section>

    <section>
      <div class="container">
        <div class="section-head reveal">
          <span class="tag" data-i18n="label.showroom">Showroom</span>
          <h2 data-i18n="info.title">Hours & location</h2>
        </div>
        <div class="panel-grid">
          <article class="panel reveal">
            <span class="tag signal" data-i18n="contact.visit.t">Visit us</span>
            <p class="addr" data-i18n="info.location.city">Oran, Algeria</p>
            <p class="spec-desc" data-i18n="info.location.d">Come see our laptops in person at the shop.</p>
            <a class="btn btn-ghost" style="margin-top: var(--s5);" data-map>
              <span class="ic" data-icon="pin"></span>
              <span data-i18n="info.location.map">Open in Maps</span>
            </a>
          </article>
          <article class="panel reveal">
            <span class="tag" data-i18n="contact.hours.t">When we are open</span>
            <h3 data-i18n="contact.hours.t">When we are open</h3>
            <div class="hours-row">
              <span class="d" data-i18n="info.hours.days">Saturday — Thursday</span>
              <span class="t" data-i18n="info.hours.time">10:00 – 20:00</span>
            </div>
            <div class="hours-row">
              <span class="d" data-i18n="info.hours.friday">Friday</span>
              <span class="t closed" data-i18n="info.hours.closed">Closed</span>
            </div>
          </article>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="assets/js/components.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/page.js"></script>
  <script src="assets/js/main.js"></script>
</body>
